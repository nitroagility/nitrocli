version: 2

env:
  - PROJECT_PATH=github.com/nitroagility/nitrocli

before:
  hooks:
    - go mod tidy

builds:
  - id: nitro
    dir: "./cmd/nitro"
    binary: "nitro"
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

archives:
  - formats: [tar.gz]
    id: nitro
    ids: ["nitro"]
    name_template: >-
      {{ .ProjectName }}_{{- title .Os }}_{{- if eq .Arch "amd64" }}x86_64{{- else if eq .Arch "386" }}i386{{- else }}{{ .Arch }}{{ end }}{{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Refactor"
      regexp: "^refactor"
      order: 2
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  footer: >-
    ---
    Released by the NitroAgility Team using [GoReleaser](https://github.com/goreleaser/goreleaser).

nfpms:
  - vendor: NitroAgility
    homepage: https://www.nitroagility.com
    maintainer: NitroAgility Team <opensource@nitroagility.com>
    description: NitroCLI
    section: golang
    license: Apache 2.0
    formats:
      - deb
      - rpm
      - apk
    file_name_template: '{{ .ProjectName }}_{{- title .Os }}_{{- if eq .Arch "amd64" }}x86_64{{- else if eq .Arch "386" }}i386{{- else }}{{ .Arch }}{{ end }}{{- if .Arm }}v{{ .Arm }}{{ end }}'
    ids:
      - nitro
