version: '3'

tasks:

  # Local environment setup

  local:clean:
    desc: Clean local environment
    cmds:
      - rm -rf dist/
      - rm -rf tmp/
      - rm -f coverage.out
      - rm -f result.json

  local:mod:
    desc: Initialize and tidy Go modules
    cmds:
      - go mod download
      - go mod tidy

  local:tools:macos:
    desc: Install local development tools
    platforms: [darwin]
    cmds:
      - brew install golangci-lint
      - brew install gofumpt

  local:
    desc: Setup the local environment
    cmds:
      - task: local:tools:macos
      - task: local:mod

  # Source code quality

  source:fmt:
    desc: Format the source code
    cmds:
      - gofumpt -w -l .

  source:lint:
    desc: Lint the source code
    cmds:
      - go vet ./...
      - golangci-lint run --config ./.golangci.yaml ./...

  source:precommit:
    desc: Run all pre-commit tasks
    cmds:
      - task: source:fmt
      - task: source:lint

  # Tests

  test:unit:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:coverage:
    desc: Run tests with coverage
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out
      - go tool cover -html=coverage.out
      - rm coverage.out

  # Build

  build:
    desc: Build the nitro binary
    cmds:
      - go build -o dist/nitro ./cmd/nitro

  run:
    desc: Run nitro
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - go run {{.TASKFILE_DIR}}/cmd/nitro {{.CLI_ARGS}}

  # CI

  ci:build:
    desc: Run the CI build
    deps: [local:clean]
    cmds:
      - goreleaser release --snapshot --clean --config .goreleaser.yaml

  ci:
    desc: Run the CI
    cmds:
      - task: ci:build
