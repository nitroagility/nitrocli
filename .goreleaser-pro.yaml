version: 2
pro: true

env:
  - ORG=nitroagility

includes:
  - from_file:
      path: ./.goreleaser.yaml

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - nitro
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

homebrew_casks:
  - name: nitro
    ids: ["nitro"]
    repository:
      owner: "{{ .Env.ORG }}"
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    alternative_names:
      - nitro@{{ .Version }}
      - nitro@{{ .Major }}
    homepage: "https://www.nitroagility.com"
    description: "NitroCLI - The official CLI for NitroAgility"
    commit_author:
      name: NitroAgility Team
      email: opensource@nitroagility.com
    license: "Apache-2.0"
    url:
      template: "https://github.com/{{ .Env.ORG }}/nitrocli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
      verified: "github.com/{{ .Env.ORG }}/nitrocli/"
    skip_upload: false
